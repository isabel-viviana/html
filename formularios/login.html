<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- RUTA CORRECTA -->
    <link rel="stylesheet" href="/estilos/style2.css">

    <title>Login</title>
</head>

<body>

    <header>
        <h1>Acceso al Sistema</h1>
    </header>

    <main class="contenedor-formularios">

        <section class="form-box">
            <h2>Iniciar Sesión</h2>

            <form action="formularios/datos.html">

                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" name="usuario" required>

                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" required>

                <button type="submit">Ingresar</button>
            </form>
        </section>

        <section class="form-box">
            <h2>Registro</h2>

            <form action="formularios/datos.html">

                <label for="nombre">Nombre completo</label>
                <input id="nombre" type="text" name="nombre" required>

                <label for="correo">Correo electrónico</label>
                <input id="correo" type="email" name="correo" required>

                <label for="usuario2">Usuario</label>
                <input id="usuario2" type="text" name="usuario" required>

                <label for="password2">Contraseña</label>
                <input id="password2" type="password" name="password" required>

                <button type="submit">Registrarse</button>
            </form>
        </section>

    </main>

</body>
</html>
