<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- RUTA CORRECTA -->
    <link rel="stylesheet" href="/estilos/style2.css">

    <title>Formulario</title>
</head>

<body>

    <header>
        <h1>Formulario de Datos Personales</h1>
    </header>

    <main class="contenedor-formularios">

        <section class="form-box">

            <form action="../index/definicion.html" method="get">

                <label for="nombre">Nombre completo</label>
                <input id="nombre" type="text" name="nombre" required>

                <label for="tipo_id">Tipo de identificación</label>
                <select id="tipo_id" name="tipo_id">
                    <option value="cc">Cédula</option>
                    <option value="ti">Tarjeta de identidad</option>
                    <option value="pasaporte">Pasaporte</option>
                </select>

                <label for="numero_id">Número de identificación</label>
                <input id="numero_id" type="text" name="numero_id" required>

                <label for="correo">Correo electrónico</label>
                <input id="correo" type="email" name="correo" required>

                <label for="telefono">Número de teléfono</label>
                <input id="telefono" type="text" name="telefono">

                <label for="direccion">Dirección</label>
                <input id="direccion" type="text" name="direccion">

                <label for="fecha">Fecha de nacimiento</label>
                <input id="fecha" type="date" name="fecha">

                <label for="edad">Edad</label>
                <input id="edad" type="number" name="edad">

                <label>Género</label>

                <div class="opciones">
                    <input type="radio" id="masculino" name="genero" value="masculino">
                    <label for="masculino">Masculino</label>
                </div>

                <div class="opciones">
                    <input type="radio" id="femenino" name="genero" value="femenino">
                    <label for="femenino">Femenino</label>
                </div>

                <div class="opciones">
                    <input type="radio" id="otro" name="genero" value="otro">
                    <label for="otro">Otro</label>
                </div>

                <label>Preferencias</label>

                <div class="opciones">
                    <input type="checkbox" id="tec" name="intereses" value="tecnologia">
                    <label for="tec">Tecnología</label>
                </div>

                <div class="opciones">
                    <input type="checkbox" id="dep" name="intereses" value="deportes">
                    <label for="dep">Deportes</label>
                </div>

                <div class="opciones">
                    <input type="checkbox" id="mus" name="intereses" value="musica">
                    <label for="mus">Música</label>
                </div>

                <label for="ocupacion">Ocupación</label>
                <select id="ocupacion" name="ocupacion">
                    <option value="estudiante">Estudiante</option>
                    <option value="empleado">Empleado</option>
                    <option value="independiente">Independiente</option>
                </select>

                <label for="comentario">Comentario</label>
                <textarea id="comentario" name="comentario" rows="4"></textarea>

                <button type="submit">Enviar</button>

            </form>

        </section>

    </main>

    <footer>
        <p>© 2026 Formulario de Datos</p>
    </footer>

</body>
</html>
